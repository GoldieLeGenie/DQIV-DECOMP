name: Build Container

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required secrets
        env:
          EXTRACT_ZIP_B64: ${{ secrets.EXTRACT_ZIP_B64 }}
          MWCCARM_ZIP_B64: ${{ secrets.MWCCARM_ZIP_B64 }}
        run: |
          if [ -z "$EXTRACT_ZIP_B64" ]; then
            echo "::error::Secret EXTRACT_ZIP_B64 is not set. Zip the contents of your local extract/eur/ folder and base64-encode it."
            exit 1
          fi
          if [ -z "$MWCCARM_ZIP_B64" ]; then
            echo "::error::Secret MWCCARM_ZIP_B64 is not set. Zip the contents of your local tools/mwccarm/ folder and base64-encode it."
            exit 1
          fi

      - name: Restore extract/eur from secret
        env:
          EXTRACT_ZIP_B64: ${{ secrets.EXTRACT_ZIP_B64 }}
        run: |
          mkdir -p extract/eur
          echo "$EXTRACT_ZIP_B64" | base64 -d > /tmp/extract.zip
          unzip -q /tmp/extract.zip -d extract/eur

      - name: Restore mwccarm from secret
        env:
          MWCCARM_ZIP_B64: ${{ secrets.MWCCARM_ZIP_B64 }}
        run: |
          mkdir -p mwccarm
          echo "$MWCCARM_ZIP_B64" | base64 -d > /tmp/mwccarm.zip
          unzip -q /tmp/mwccarm.zip -d mwccarm
          chmod -R +x mwccarm

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .docker/Dockerfile
          push: true
          tags: |
            ghcr.io/goldielegenie/dqiv-build:latest
