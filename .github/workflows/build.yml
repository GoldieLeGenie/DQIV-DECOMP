name: Build

on:
  push:
  pull_request:

jobs:
  build:
    container: ghcr.io/goldielegenie/dqiv-build:latest

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: [eur]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Prepare
        run: |
          rm -rf ./extract/eur
          mv /extract/* ./extract

      - name: Build
        run: |
          python3 tools/configure.py -w wibo --compiler /mwccarm --no-extract ${{ matrix.version }}
          ./dsd lcf -c config/eur/arm9/config.yaml
          mv build/eur/arm9.lcf build/eur/linker_script.lcf
          ninja arm9 report check

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.version }}_report
          path: build/${{ matrix.version }}/report.json
