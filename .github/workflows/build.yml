name: PR Check

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check-forbidden-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for forbidden binary/ROM/asset files
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          bad=$(git diff --name-only "$base" "$head" \
                | grep -iE '\.(nds|exe|dll|o|bin|png|jpe?g|zip|rar|7z)$' || true)
          if [ -n "$bad" ]; then
            echo "::error::This PR adds forbidden binary/ROM/asset files. Only C source is allowed:"
            echo "$bad"
            exit 1
          fi
          echo "OK — no forbidden files."
